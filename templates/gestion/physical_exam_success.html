<!-- templates/gestion/physical_exam_success.html -->
{% extends "_base.html" %}
{% load static %}

{% block content %}
<div class="max-w-2xl mx-auto py-16 px-4 text-center">
    <div class="bg-white rounded-xl shadow-lg p-8">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Examen physique enregistré !</h1>
        <p class="text-gray-600 mb-6">
            L'examen physique pour <strong>{{ physical_exam.name }}</strong> a bien été enregistré.
        </p>
        <div class="flex justify-center space-x-3">
            <a href="{% url 'application_detail' physical_exam.application.id %}"
                class="px-6 py-2 bg-red-700 text-white rounded-lg hover:bg-red-800">
                Voir la demande complète
            </a>
        </div>
    </div>
</div>
{% endblock %}

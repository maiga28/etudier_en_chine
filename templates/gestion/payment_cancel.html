<!-- templates/gestion/payment_cancel.html -->
{% extends "_base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-gray-50 dark:bg-gray-900 py-16 px-4">
    <div class="max-w-2xl mx-auto text-center">
        <!-- Icône d'erreur -->
        <div class="mb-6">
            <div class="h-20 w-20 bg-red-100 rounded-full flex items-center justify-center mx-auto">
                <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                    </path>
                </svg>
            </div>
        </div>

        <!-- Titre -->
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white mb-4">
            Paiement annulé
        </h1>

        <!-- Message -->
        <p class="text-gray-600 dark:text-gray-400 mb-6">
            Le paiement a été annulé. Aucun montant n'a été débité.
        </p>

        <!-- Options -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 mb-6">
            <p class="text-gray-700 dark:text-gray-300 mb-4">
                Vous pouvez réessayer le paiement ou contacter notre support.
            </p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="{% url 'payment_page' application.id %}"
                    class="px-6 py-2 bg-red-700 text-white rounded-lg hover:bg-red-800 transition">
                    Réessayer le paiement
                </a>
                <a href="{% url 'contact' %}"
                    class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
                    Contacter le support
                </a>
            </div>
        </div>

        <a href="{% url 'gestion' %}" class="text-red-600 hover:text-red-700">
            ← Retour au tableau de bord
        </a>
    </div>
</div>
{% endblock %}

<!-- templates/contact/index.html -->
{% extends "_base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gray-50 dark:bg-gray-900">
    <div class="max-w-md w-full space-y-8">
        <!-- Logo -->
        <div class="text-center">
            <div class="flex justify-center">
                <div class="h-16 w-16 bg-red-700 rounded-full flex items-center justify-center">
                    <span class="text-yellow-400 text-3xl font-bold">★</span>
                </div>
            </div>
            <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white">
                Déconnexion
            </h2>
            <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                Êtes-vous sûr de vouloir vous déconnecter ?
            </p>
        </div>

        <!-- Formulaire de déconnexion -->
        <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
            <form method="POST" action="{% url 'account_logout' %}">
                {% csrf_token %}

                {% if redirect_field_value %}
                <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
                {% endif %}

                <div class="flex flex-col space-y-4">
                    <button type="submit"
                        class="w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition duration-300">
                        Me déconnecter
                    </button>

                    <a href="{% url 'index' %}"
                        class="w-full flex justify-center py-2 px-4 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition duration-300 dark:bg-gray-700 dark:text-white dark:border-gray-600 dark:hover:bg-gray-600">
                        Annuler
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
